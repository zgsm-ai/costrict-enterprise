Name: chat-rag
Host: 0.0.0.0
Port: 8888

# Logging configuration
Log:
  LogFilePath: "logs/"
  # Storage type: "disk" (default) or "s3"
  storageType: "disk"
  # S3/MinIO configuration (required when storageType is "s3")
  s3:
    endpoint: "localhost:9000"
    bucket: "chat-rag-logs"
    accessKey: "minioadmin"
    secretKey: "minioadmin"
    useSSL: false
    region: ""
    # Skip BucketExists/MakeBucket on startup; set to true when the bucket
    # is pre-provisioned and credentials lack list/create permissions.
    skipBucketCheck: false

# Department configuration
DepartmentApiEndpoint: "http://localhost:1234/work_id?work_id="

# Models supported by function calling
LLM:
  # Endpoint: "https://zgsm.sangfor.com/chat-rag/api/v1/chat/completions"
  # Endpoint: "http://zgsm.sangfor.com/oneapi/v1/chat/completions"
  Endpoint: "http://127.0.0.1:30616/chat-rag/api/v1/chat/completions"

LLMTimeout:
  # Regular mode timeout configuration (普通模式超时配置)
  # 单次连续空闲阈值（毫秒），默认 180000ms (180s)
  IdleTimeoutMs: 180000
  # 总空闲预算（毫秒），跨重试/降级累计空闲时长上限，默认 180000ms (180s)
  TotalIdleTimeoutMs: 180000

  # Regular mode retry configuration (普通模式重试配置)
  # 最大重试次数，默认 1（即总共尝试 2 次）
  MaxRetryCount: 1
  # 重试间隔（毫秒），默认 5000ms（5秒）
  RetryIntervalMs: 5000

# Router configuration (路由配置)
# Note: This configuration can also be loaded from Nacos
router:
  enabled: false
  strategy: semantic
  semantic:
    analyzer:
      model: "gpt-4"
      timeoutMs: 30000
      totalTimeoutMs: 60000
      maxInputBytes: 10000
    inputExtraction:
      protocol: "openai"
      userJoinSep: "\n\n"
      stripCodeFences: true
      maxUserMessages: 100
      maxHistoryBytes: 2048
      maxHistoryMessages: 5
    routing:
      candidates:
        - modelName: "gpt-4"
          enabled: true
          scores:
            general: 10
      minScore: 5
      fallbackModelName: "gpt-4"

      # Timeout configuration for model degradation scenarios (模型降级场景的超时配置)
      idleTimeoutMs: 180000      # 单次空闲超时，默认 180000ms (180s)
      totalIdleTimeoutMs: 180000 # 总空闲超时预算，默认 180000ms (180s)

      # Retry configuration for model degradation scenarios (模型降级场景的重试配置)
      maxRetryCount: 1           # 最大重试次数，默认 1
      retryIntervalMs: 5000      # 重试间隔（毫秒），默认 5000ms
    ruleEngine:
      enabled: false
      bodyPrefix: "body."
      headerPrefix: "header."

Redis:
  Addr: "127.0.0.1:6379"

# VIP priority configuration
VIPPriority:
  # Enable setting priority parameter for VIP users
  enabled: false

# Forward configuration
# 不做对请求不做任何处理，只做记录，可用来抓包
forward:
  # Enable forwarding interface
  enabled: true
  # Default target URL for forwarding (optional)
  # If not provided, target URL must be specified in query parameter
  # defaultTarget: "http://zgsm.sangfor.com/"

# Nacos configuration center settings
nacos:
  # Nacos server address
  serverAddr: "localhost"
  # Nacos server port
  serverPort: 8848
  # Nacos gRPC port
  # grpcPort: 9848
  # Nacos namespace (leave empty for default namespace)
  namespace: "ca7a2781-bfa5-4b58-8929-702cdc1f7e06"
  # Nacos group for configuration
  group: "CHAT_RAG"
  # Timeout in seconds for Nacos operations
  timeoutSec: 10
  # Log directory for Nacos client
  logDir: "logs/nacos"
  # Cache directory for Nacos client
  cacheDir: "logs/nacos/cache"

chatMetrics:
  enabled: false
  url: "http://127.0.0.1:8080/internal/indicator/api/v1/chat-indicator"
  method: "PUT"

requestVerify:
  enabled: false
  enabledTimeVerify: false

# 代金券活动配置
voucher_activity:
  # 是否启用代金券活动功能
  enabled: false
  # 签名密钥（用于生成和验证兑换码，请妥善保管）
  signingKey: "your-secret-signing-key-change-this-in-production"
  # 活动列表（支持多个活动）
  activities:
    # 活动1 - 新年活动
    - keyword: "新年代金券"  # 活动关键字，用户发送此关键字可触发兑换活动
      creditAmount: 100  # 每个兑换码包含的 credit 数量
      voucherExpiryDays: 30  # 兑换码过期天数（从生成之日算起）
      # 活动开始时间（支持多种格式：YYYY-MM-DD、YYYY-MM-DDTHH、YYYY-MM-DDTHH:MM、YYYY-MM-DDTHH:MM:SS）
      startTime: "2024-01-01T00:00"
      # 活动结束时间（支持多种格式：YYYY-MM-DD、YYYY-MM-DDTHH、YYYY-MM-DDTHH:MM、YYYY-MM-DDTHH:MM:SS）
      endTime: "2024-02-29T23:59"
      totalQuota: 10000  # 兑换总量限制
      # 兑换成功返回模板（Go template 格式）
      # 支持变量：
      #   {{.VoucherCode}} - 兑换码
      #   {{.Config.CreditAmount}} - credit 数量
      #   {{.Config.VoucherExpiryDays}} - 过期天数
      successTemplate: |
        🎉 恭喜您成功领取新年代金券！
        兑换码：{{.VoucherCode}}
        可获得：{{.Config.CreditAmount}} credit
        有效期：{{.Config.VoucherExpiryDays}} 天
        请在有效期内使用。
      # 已领取过的文案（Go template 格式）
      alreadyRedeemedMessage: "您已经领取过新年代金券了，每人限领一次哦~"
      # 兑换码过期文案（Go template 格式）
      expiredMessage: "抱歉，新年代金券活动已结束，请关注后续活动。"
      # 兑换额度用尽文案（Go template 格式）
      quotaExhaustedMessage: "抱歉，新年代金券已发放完毕，请关注后续活动。"

    # 活动2 - 春节活动（示例）
    - keyword: "春节代金券"
      creditAmount: 200
      voucherExpiryDays: 45
      startTime: "2024-02-01T00:00"
      endTime: "2024-02-15T23:59"
      totalQuota: 5000
      successTemplate: |
        🧧 恭喜您成功领取春节代金券！
        兑换码：{{.VoucherCode}}
        可获得：{{.Config.CreditAmount}} credit
        有效期：{{.Config.VoucherExpiryDays}} 天
        新春快乐！
      alreadyRedeemedMessage: "您已经领取过春节代金券了，每人限领一次哦~"
      expiredMessage: "抱歉，春节代金券活动已结束。"
      quotaExhaustedMessage: "抱歉，春节代金券已发放完毕。"
